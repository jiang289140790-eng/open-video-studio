<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>公开分享 | Luravyn</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <meta name="description" content="Luravyn 登录后产品页面。">
    <link rel="canonical" href="https://luravyn.com/zh/share/">
    <link rel="alternate" hreflang="zh-CN" href="https://luravyn.com/zh/share/">
    <link rel="alternate" hreflang="en" href="https://luravyn.com/en/share/">
    <link rel="alternate" hreflang="ja" href="https://luravyn.com/ja/share/">
    <link rel="alternate" hreflang="ko" href="https://luravyn.com/ko/share/">
    <link rel="alternate" hreflang="x-default" href="https://luravyn.com/en/share/">
    <meta name="robots" content="noindex,follow">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Luravyn">
    <meta property="og:title" content="公开分享 | Luravyn">
    <meta property="og:description" content="Luravyn 登录后产品页面。">
    <meta property="og:url" content="https://luravyn.com/zh/share/">
    <meta property="og:image" content="https://luravyn.com/brand/luravyn-logo-hero.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="公开分享 | Luravyn">
    <meta name="twitter:description" content="Luravyn 登录后产品页面。">
    <meta name="theme-color" content="#111111">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="share-body">
    <main class="share-page">
      <a class="brand" href="./index.html"><img class="brand-wordmark" src="./brand/luravyn-logo.png" alt="Luravyn"></a>
      <section class="share-frame art-1" data-share-frame>
        <span class="play-dot"></span>
        <h1 data-share-title>霓虹发布短片</h1>
        <p data-share-type>视频作品</p>
      </section>
      <aside class="share-meta">
        <p class="eyebrow">公开分享页</p>
        <h2>由 Luravyn 生成</h2>
        <p class="muted" data-share-prompt>提示词：电影感产品发布，固定主持人，紫色工作室灯光，平滑镜头运动。</p>
        <dl>
          <div><dt>角色</dt><dd data-share-character>Mira</dd></div>
          <div><dt>模型</dt><dd data-share-model>MVP 可用模型</dd></div>
          <div><dt>积分</dt><dd data-share-credits>24</dd></div>
          <div><dt>状态</dt><dd data-share-status>公开</dd></div>
        </dl>
        <div class="share-actions">
          <button class="btn primary full" type="button" data-share-generate>生成相似作品</button>
          <button class="btn glass full" type="button" data-share-copy-prompt>复制提示词</button>
          <button class="btn glass full" type="button" data-share-save>保存到我的资产</button>
          <a class="btn glass full" href="#" data-share-download hidden>下载作品</a>
        </div>
        <div class="share-conversion">
          <span>想创建自己的作品？</span>
          <a href="./zh/app/">浏览工具</a>
          <a href="./zh/pricing/">购买积分</a>
          <a href="./zh/login/" data-auth-modal>登录</a>
        </div>
      </aside>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
