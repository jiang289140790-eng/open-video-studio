<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>作品探索 | Open Video Studio</title>
    <meta name="description" content="探索 Open Video Studio 的 AI 图片、视频、角色、提示词和可复用资产。">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./index.html"><span class="brand-mark">OVS</span><span>Open Video Studio</span></a>
      <nav class="topnav" aria-label="Primary navigation"><a href="./zh/app/generate/">图像工具</a><a href="./zh/app/image-to-video/">视频工具</a><a href="./zh/pricing/">购买积分</a><a href="./zh/free-coins/">免费硬币</a><a href="./zh/my-creations/">我的创作</a></nav>
      <nav class="accountnav" aria-label="Account navigation"><a class="daily-check" href="./zh/free-coins/">每日签到</a><a href="./zh/login/">登录</a></nav>
      <a class="btn primary" href="./zh/app/generate/">开始创作</a>
    </header>

    <main class="app-surface">
      <section class="page-hero compact">
        <p class="eyebrow">作品探索</p>
        <h1>发现可以复用的 AI 作品、角色和提示词</h1>
        <p class="lead">这里是灵感入口：热门作品、参考图、角色世界和一键再生成操作集中在一个视觉页面。</p>
      </section>

      <section class="studio-toolbar" aria-label="Gallery controls">
        <input class="search" data-gallery-filter type="search" placeholder="搜索电影感、产品、角色、视频">
        <div class="chip-row" aria-label="Category filters">
          <button class="chip active">热门</button>
          <button class="chip">最新</button>
          <button class="chip">图片</button>
          <button class="chip">视频</button>
          <button class="chip">角色</button>
          <button class="chip">收藏</button>
        </div>
      </section>

      <section class="gallery-tabs" aria-label="Image and video tabs">
        <button class="tab active">图片流</button>
        <button class="tab">视频流</button>
        <button class="tab">角色世界</button>
      </section>

      <section class="masonry-gallery" aria-label="Masonry AI gallery">
        <article class="gallery-item tall art-1" data-asset data-gallery-title="霓虹发布短片" data-gallery-prompt="产品发布、蓝紫灯光、电影感、竖屏视频"><div><span>热门视频</span><h3>霓虹发布短片</h3><p>提示词：产品发布、蓝紫灯光、电影感</p><div class="card-actions"><button data-gallery-similar>生成相似</button><button data-copy-gallery-prompt>复制提示词</button><button data-gallery-share>分享</button><button data-gallery-favorite>收藏</button></div></div></article>
        <article class="gallery-item art-6" data-asset data-gallery-title="商业肖像" data-gallery-prompt="工作室商业肖像、柔和灯光、一致性角色 Mira"><div><span>图片</span><h3>商业肖像</h3><p>角色：Mira</p><div class="card-actions"><button data-gallery-similar>生成相似</button><button data-gallery-favorite>收藏</button></div></div></article>
        <article class="gallery-item wide art-9" data-asset data-gallery-title="社媒发布套图" data-gallery-prompt="品牌社媒发布套图、8 张分镜、可复用参考资产"><div><span>分镜</span><h3>社媒发布套图</h3><p>8 张画面，可复用参考</p><div class="card-actions"><button data-gallery-similar>生成相似</button><button data-copy-gallery-prompt>复制提示词</button></div></div></article>
        <article class="gallery-item art-8" data-asset data-gallery-title="微距产品图" data-gallery-prompt="微距产品图、干净背景、反射材质、商业摄影"><div><span>产品</span><h3>微距产品图</h3><p>模型：local-image-v0</p><div class="card-actions"><button data-gallery-share>分享</button><button data-gallery-favorite>收藏</button></div></div></article>
        <article class="gallery-item tall art-7" data-asset data-gallery-title="竖屏预告片" data-gallery-prompt="9:16 竖屏预告片、快速镜头、适合社媒投放"><div><span>视频</span><h3>竖屏预告片</h3><p>9:16，24 积分</p><div class="card-actions"><button data-gallery-similar>生成相似</button><button data-gallery-share>分享</button></div></div></article>
        <article class="gallery-item art-12" data-asset data-gallery-title="Nova 场景测试" data-gallery-prompt="Nova 角色一致性场景测试、品牌角色、海报镜头"><div><span>角色</span><h3>Nova 场景测试</h3><p>一致性 95%</p><div class="card-actions"><button data-open-character>打开角色</button><button data-gallery-favorite>收藏</button></div></div></article>
        <article class="gallery-item art-10" data-asset data-gallery-title="灯光参考板" data-gallery-prompt="蓝色工作室灯光参考板、电影感、高级产品氛围"><div><span>参考</span><h3>灯光参考板</h3><p>已保存到资产库</p><div class="card-actions"><button data-gallery-similar>用于生成</button></div></div></article>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
