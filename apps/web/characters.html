<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>角色生成器 | Open Video Studio</title>
    <meta name="description" content="创建和管理可复用 AI 角色，包含角色资料、标签、一致性评分和关联资产。">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./index.html"><span class="brand-mark">OVS</span><span>Open Video Studio</span></a>
      <nav class="topnav" aria-label="Primary navigation"><a href="./zh/app/generate/">图像工具</a><a href="./zh/app/image-to-video/">视频工具</a><a href="./zh/pricing/">购买积分</a><a href="./zh/free-coins/">免费硬币</a><a href="./zh/my-creations/">我的创作</a></nav>
      <nav class="accountnav" aria-label="Account navigation"><a class="daily-check" href="./zh/free-coins/">每日签到</a><a href="./zh/login/">登录</a></nav>
      <a class="btn primary" href="./zh/app/generate/">生成角色</a>
    </header>
    <main class="app-surface">
      <section class="page-hero compact"><p class="eyebrow">角色生成器</p><h1>创建可复用的一致性角色</h1><p class="lead">先保存角色记忆、标签、封面和参考资产，再生成新的图片或视频场景。</p></section>
      <section class="character-toolbar">
        <input class="search" data-character-search placeholder="搜索角色、标签、定位或记忆">
        <div class="gallery-tabs">
          <button class="tab active" type="button" data-character-filter="all">全部</button>
          <button class="tab" type="button" data-character-filter="active">可生成</button>
          <button class="tab" type="button" data-character-filter="draft">草稿</button>
          <button class="tab" type="button" data-character-filter="favorite">收藏</button>
        </div>
      </section>
      <section class="character-layout">
        <div class="character-grid" data-character-list>
          <article class="character-card large art-2"><strong>Mira</strong><span>主持人 - 一致性 92%</span><p>标签：发布、工作室、冷静</p></article>
          <article class="character-card large art-11"><strong>Atlas</strong><span>产品讲解员 - 一致性 88%</span><p>标签：产品、干净、商业</p></article>
          <article class="character-card large art-12"><strong>Nova</strong><span>创作者形象 - 一致性 95%</span><p>标签：时尚、霓虹、竖屏</p></article>
        </div>
        <aside class="profile-preview" data-character-profile>
          <p class="eyebrow">角色预览</p>
          <div class="avatar art-2"></div>
          <h2>Mira 工作室主持人</h2>
          <p class="muted">适合 SaaS 产品讲解、发布短片和品牌介绍的固定角色。</p>
          <div class="score">一致性评分 <strong>92%</strong></div>
          <div class="character-action-row"><a class="btn primary" href="./zh/app/generate/">使用角色生成</a><button class="btn glass" type="button">复制角色提示词</button></div>
          <h3>关联资产</h3>
          <div class="mini-assets"><span class="thumb art-3"></span><span class="thumb art-7"></span><span class="thumb art-8"></span></div>
          <form class="auth-card" data-character-form>
            <h3>创建角色</h3>
            <label>名称<input class="input" name="name" placeholder="Luna"></label>
            <label>角色定位<input class="input" name="role" placeholder="时尚主持人"></label>
            <label>标签<input class="input" name="tags" placeholder="时尚, 霓虹, 竖屏"></label>
            <label>角色记忆<textarea class="textarea" name="memory" placeholder="固定外观、语气、镜头偏好和不能改变的设定"></textarea></label>
            <button class="btn primary full" type="submit">创建角色</button>
          </form>
        </aside>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
