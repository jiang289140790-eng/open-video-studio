<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>图片生成器 | Open Video Studio</title>
    <meta name="description" content="使用 Open Video Studio 生成 AI 图片、视频和角色资产。">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./index.html"><span class="brand-mark">OVS</span><span>Open Video Studio</span></a>
      <nav class="topnav" aria-label="Primary navigation"><a href="./zh/app/generate/" aria-current="page">图像工具</a><a href="./zh/app/image-to-video/">视频工具</a><a href="./zh/pricing/">购买积分</a><a href="./zh/free-coins/">免费硬币</a><a href="./zh/my-creations/">我的创作</a></nav>
      <nav class="accountnav" aria-label="Account navigation"><a class="daily-check" href="./zh/free-coins/">每日签到</a><a href="./zh/login/">登录</a></nav>
      <a class="btn primary" href="./zh/pricing/"><span data-credit-balance>40</span> 积分</a>
    </header>

    <main class="studio-shell">
      <section class="studio-panel control-panel">
        <p class="eyebrow">图片生成器</p>
        <h1>生成你的下一张 AI 作品</h1>

        <div class="mode-grid" aria-label="Mode cards">
          <button class="mode-card active" data-mode="image"><span>图片</span><strong>概念图</strong><em>8 积分</em></button>
          <button class="mode-card" data-mode="video"><span>视频</span><strong>动态场景</strong><em>24 积分</em></button>
          <button class="mode-card" data-mode="character"><span>角色</span><strong>角色种子</strong><em>12 积分</em></button>
        </div>

        <label class="studio-field">提示词
          <textarea class="textarea hero-textarea">电影感产品发布场景，固定角色主持人，电光蓝灯效，反光地面，镜头平滑移动，高级 AI 创作平台氛围。</textarea>
        </label>
        <button class="btn glass" data-enhance type="button">优化提示词</button>

        <div class="selector-grid">
          <label class="studio-field">角色选择
            <select class="select"><option>Mira - 工作室主持人</option><option>Atlas - 产品讲解员</option><option>Nova - 创作者形象</option></select>
          </label>
          <label class="studio-field">风格选择
            <select class="select"><option>电影感粉紫</option><option>干净商业</option><option>运动镜头</option><option>霓虹动漫</option></select>
          </label>
        </div>

        <label class="upload-zone">上传参考资产
          <input type="file" aria-label="Upload reference asset">
          <span>支持图片、视频帧、提示词或参考板</span>
        </label>
      </section>

      <section class="studio-panel preview-panel">
        <div class="preview-head">
          <div><p class="eyebrow">实时预览</p><h2>生成预览</h2></div>
          <span class="credit-pill" data-credit-cost>8 积分</span>
        </div>
        <div class="creative-preview art-13">
          <span class="play-dot"></span>
          <strong data-mode-label>图片生成</strong>
        </div>
        <div class="sticky-generate">
          <div><strong>准备生成</strong><p>结果会保存到资产库和生成历史。</p></div>
          <button class="btn primary" data-generate type="button">生成</button>
        </div>
        <div class="recent-results" data-queue>
          <h2>最近结果</h2>
          <article class="result-row"><span class="thumb art-3"></span><div><strong>发布主视觉</strong><p>已完成 - 已分享 1 次</p></div><a href="./zh/share/">分享</a></article>
          <article class="result-row"><span class="thumb art-7"></span><div><strong>竖屏短片</strong><p>队列中 - 24 积分</p></div><a href="./zh/history/">历史</a></article>
        </div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
