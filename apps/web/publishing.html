<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Publishing Center | Luravyn</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <meta name="description" content="Luravyn 登录后产品页面。">
    <link rel="canonical" href="https://luravyn.com/zh/publishing/">
    <link rel="alternate" hreflang="zh-CN" href="https://luravyn.com/zh/publishing/">
    <link rel="alternate" hreflang="en" href="https://luravyn.com/en/publishing/">
    <link rel="alternate" hreflang="ja" href="https://luravyn.com/ja/publishing/">
    <link rel="alternate" hreflang="ko" href="https://luravyn.com/ko/publishing/">
    <link rel="alternate" hreflang="x-default" href="https://luravyn.com/en/publishing/">
    <meta name="robots" content="noindex,follow">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Luravyn">
    <meta property="og:title" content="Publishing Center | Luravyn">
    <meta property="og:description" content="Luravyn 登录后产品页面。">
    <meta property="og:url" content="https://luravyn.com/zh/publishing/">
    <meta property="og:image" content="https://luravyn.com/brand/luravyn-logo-hero.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Publishing Center | Luravyn">
    <meta name="twitter:description" content="Luravyn 登录后产品页面。">
    <meta name="theme-color" content="#111111">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./index.html"><img class="brand-wordmark" src="./brand/luravyn-logo.png" alt="Luravyn"></a>
      <nav class="topnav" aria-label="Primary navigation"></nav>
      <nav class="accountnav" aria-label="Account navigation"></nav>
    </header>
    <main class="app-surface content-os-page">
      <section class="page-hero compact">
        <p class="eyebrow">Publishing Center</p>
        <h1>发布中心</h1>
        <p class="lead">把平台版本、发布账号、排期和状态放在同一处。第一版只做本地模拟，真实发布适配器后续接入。</p>
      </section>
      <section class="queue-toolbar">
        <button class="active" type="button" data-publishing-filter="all">全部</button>
        <button type="button" data-publishing-filter="needs_review">待审核</button>
        <button type="button" data-publishing-filter="scheduled">已排期</button>
        <button type="button" data-publishing-filter="published">已发布</button>
        <button type="button" data-publishing-filter="failed">失败</button>
      </section>
      <section class="queue-list" data-publishing-list></section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
