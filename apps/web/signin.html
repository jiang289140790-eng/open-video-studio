<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 | Open Video Studio</title>
    <meta name="description" content="使用 Google、X、Telegram 或 Discord 登录 Open Video Studio。">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="login-modal-page">
    <header class="topbar">
      <a class="brand" href="./index.html"><span class="brand-mark">OVS</span><span>Open Video Studio</span></a>
      <nav class="topnav" aria-label="Primary navigation"><a href="./zh/app/generate/">图像工具</a><a href="./zh/app/image-to-video/">视频工具</a><a href="./zh/pricing/">购买积分</a><a href="./zh/free-coins/">免费硬币</a><a href="./zh/my-creations/">我的创作</a></nav>
      <nav class="accountnav" aria-label="Account navigation"><a class="daily-check" href="./zh/free-coins/">每日签到</a><a href="./zh/login/" aria-current="page">登录</a></nav>
    </header>

    <main class="login-modal-shell">
      <div class="login-backdrop-grid" aria-hidden="true">
        <span class="tool-poster art-3"></span>
        <span class="tool-poster art-7"></span>
        <span class="tool-poster art-2"></span>
        <span class="tool-poster art-9"></span>
        <span class="tool-poster art-12"></span>
        <span class="tool-poster art-1"></span>
      </div>

      <section class="login-modal-card" aria-label="登录到 Open Video Studio">
        <a class="modal-close" href="./zh/app/" aria-label="关闭登录弹窗">×</a>
        <h1>登录到 Open Video Studio</h1>
        <p class="muted">选择一个账号继续创作。登录后可以保存作品、购买积分、复用资产并管理分享链接。</p>

        <div class="modal-auth-list">
          <a class="modal-auth-btn" href="./zh/dashboard/" data-auth-provider="google"><span class="provider-dot google-dot">G</span>使用 Google 登录 <b>→</b></a>
          <a class="modal-auth-btn" href="./zh/dashboard/" data-auth-provider="twitter"><span class="provider-dot x-dot">X</span>使用 X 登录 <b>→</b></a>
          <a class="modal-auth-btn" href="./zh/dashboard/" data-telegram-auth><span class="provider-dot tg-dot">TG</span>使用 Telegram 登录 <b>→</b></a>
          <a class="modal-auth-btn" href="./zh/dashboard/" data-auth-provider="discord"><span class="provider-dot dc-dot">DC</span>使用 Discord 登录 <b>→</b></a>
        </div>

        <p class="auth-message" data-auth-message>配置 Supabase OAuth 后，Google / X / Discord 会进行真实登录；Telegram 需要配置 Telegram Bot 和回调校验。</p>
        <p class="login-terms">继续即表示你同意我们的 <a href="./zh/app/">服务条款</a> 和 <a href="./zh/app/">隐私政策</a>。</p>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
