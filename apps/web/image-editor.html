<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>图片编辑器 | Open Video Studio</title>
    <meta name="description" content="上传参考图，使用提示词重绘、扩展、修复和生成可复用 AI 资产。">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar"><a class="brand" href="./zh/app/"><span class="brand-mark">OVS</span><span>Open Video Studio</span></a><nav class="topnav"><a href="./zh/app/image-editor/" aria-current="page">图像工具</a><a href="./zh/app/image-to-video/">视频工具</a><a href="./zh/pricing/">购买积分</a><a href="./zh/free-coins/">免费硬币</a><a href="./zh/my-creations/">我的创作</a></nav><nav class="accountnav"><a class="daily-check" href="./zh/free-coins/">每日签到</a><a href="./zh/login/">登录</a></nav></header>
    <main class="app-surface tool-detail-page">
      <section class="tool-detail-hero">
        <div class="tool-detail-copy"><p class="eyebrow">AI 图像</p><h1>图片编辑器</h1><p class="lead">上传图片，用提示词修改画面、替换背景、修复细节，并把结果保存为可复用资产。</p><div class="tool-chip-row"><span>重绘</span><span>扩图</span><span>局部修复</span><span>参考图</span></div><a class="btn primary" href="./zh/app/generate/">开始编辑</a></div>
        <div class="tool-detail-preview"><div class="tool-preview-canvas art-3"></div><div class="tool-control-row"><span>上传图片</span><span>输入修改需求</span><span>保存到资产库</span></div></div>
      </section>
      <section class="tool-flow-grid"><article><span>01</span><h3>上传参考</h3><p>选择产品图、人物图或场景图作为编辑基础。</p></article><article><span>02</span><h3>描述修改</h3><p>使用自然语言说明风格、镜头、背景和构图。</p></article><article><span>03</span><h3>继续复用</h3><p>结果进入素材库，可用于视频或后续生成。</p></article></section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
