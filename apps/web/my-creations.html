<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的创作 | Open Video Studio</title>
    <meta name="description" content="查看 Open Video Studio 中生成的图片、视频、角色、提示词、资产和分享链接。">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./index.html"><span class="brand-mark">OVS</span><span>Open Video Studio</span></a>
      <nav class="topnav" aria-label="Primary navigation"><a href="./generate.html">图像工具</a><a href="./image-to-video.html">视频工具</a><a href="./pricing.html">购买积分</a><a href="./referral.html">免费硬币</a><a href="./my-creations.html" aria-current="page">我的创作</a></nav>
      <nav class="accountnav" aria-label="Account navigation"><a class="daily-check" href="./referral.html">Daily Check-in</a><a href="./signin.html">登录</a></nav>
    </header>
    <main class="app-surface creations-page">
      <section class="page-hero compact">
        <h1>我的创作</h1>
        <p class="lead">这里保存你的图片、视频、提示词、角色引用和公开分享链接。</p>
      </section>
      <section class="metric-grid dashboard-sections">
        <article><span>Credits</span><strong data-dashboard-credits>40</strong><p>可用积分</p></article>
        <article><span>Creations</span><strong data-dashboard-assets>2</strong><p>已保存资产</p></article>
        <article><span>Jobs</span><strong data-dashboard-jobs>2</strong><p>生成历史</p></article>
        <article><span>Shares</span><strong data-dashboard-shares>1</strong><p>公开链接</p></article>
      </section>
      <section class="studio-toolbar">
        <input class="search" data-gallery-filter placeholder="搜索角色、提示词、模型或状态">
        <div class="gallery-tabs"><button class="tab active">全部</button><button class="tab">图片</button><button class="tab">视频</button><button class="tab">收藏</button><button class="tab">公开</button></div>
      </section>
      <section class="tool-section">
        <div class="tool-section-head"><h2>作品库</h2><a href="./generate.html">继续生成</a></div>
        <div class="asset-library" data-asset-list></div>
      </section>
      <section class="tool-section">
        <div class="tool-section-head"><h2>生成历史</h2><a href="./history.html">View More</a></div>
        <div class="history-list" data-history-list></div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
