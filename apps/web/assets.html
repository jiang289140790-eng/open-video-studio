<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>资产库 | Luravyn</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <meta name="description" content="管理 Luravyn 中可复用的图片、视频、提示词、参考图和收藏资产。">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./index.html"><img class="brand-wordmark" src="./brand/luravyn-logo.png" alt="Luravyn"></a>
      <nav class="topnav" aria-label="Primary navigation"><a href="./zh/app/generate/">图像工具</a><a href="./zh/app/image-to-video/">视频工具</a><a href="./zh/pricing/">购买积分</a><a href="./zh/free-coins/">免费硬币</a><a href="./zh/my-creations/">我的创作</a></nav>
      <nav class="accountnav" aria-label="Account navigation"><a class="daily-check" href="./zh/free-coins/">每日签到</a><a href="./zh/login/">登录</a></nav>
      <a class="btn primary" href="./zh/app/generate/">添加资产</a>
    </header>
    <main class="app-surface">
      <section class="page-hero compact"><p class="eyebrow">资产库</p><h1>你的 AI 创作素材库</h1><p class="lead">图片、视频、提示词、参考图、收藏和未来媒体类型都会作为可复用素材保存在这里。</p></section>
      <section class="studio-toolbar"><input class="search" data-gallery-filter placeholder="搜索资产、提示词、参考图"><div class="chip-row"><button class="chip active" type="button" data-asset-filter="all">全部</button><button class="chip" type="button" data-asset-filter="图片">图片</button><button class="chip" type="button" data-asset-filter="视频">视频</button><button class="chip" type="button" data-asset-filter="提示词">提示词</button><button class="chip" type="button" data-asset-filter="参考图">参考图</button><button class="chip" type="button" data-asset-filter="收藏">收藏</button></div></section>
      <section class="asset-library" data-asset-list>
        <article class="library-card"><span class="thumb art-3"></span><div><h3>发布主视觉</h3><p>图片 - 收藏 - 角色 Mira</p></div><button>使用</button></article>
        <article class="library-card"><span class="thumb art-7"></span><div><h3>竖屏短片</h3><p>视频 - 公开 - 24 积分</p></div><button>分享</button></article>
        <article class="library-card"><span class="thumb prompt-thumb"></span><div><h3>电影感产品提示词</h3><p>提示词 - 已复制 18 次</p></div><button>复制</button></article>
        <article class="library-card"><span class="thumb art-10"></span><div><h3>蓝色工作室参考</h3><p>参考图 - 已通过</p></div><button>生成</button></article>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
