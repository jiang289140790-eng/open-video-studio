<!doctype html>
<html lang="zh-CN">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Image Editor | Luravyn</title><link rel="stylesheet" href="./styles.css"></head>
  <body>
    <header class="topbar"><a class="brand" href="./index.html"><img class="brand-wordmark" src="./brand/luravyn-logo.png" alt="Luravyn"></a><nav class="topnav"><a href="./zh/image-tools/">图像工具⌄</a><a href="./zh/video-tools/">视频工具⌄</a><a href="./zh/pricing/">购买积分</a><a href="./zh/free-coins/">免费硬币</a><a href="./zh/my-creations/">我的创作</a></nav><nav class="accountnav"><a class="daily-check" href="./zh/free-coins/">Daily Check-in</a><a href="./zh/login/">登录</a></nav></header>
    <main class="studio-shell hifun-generator" data-image-editor>
      <section class="studio-panel control-panel"><a class="back-link" href="./zh/app/">← Image Editor</a><div class="segmented-control"><button class="active" type="button">单张图片</button><button type="button">多张图片</button></div><section class="upload-zone" data-edit-upload-zone><div class="upload-empty"><strong>在此处拖动图片，或</strong><span>支持 JPEG、PNG 和 WebP 格式</span></div><label class="btn glass">从相册选择<input type="file" accept="image/*" data-edit-upload hidden></label><article class="reference-card" data-edit-reference-card hidden><span class="thumb art-3" data-edit-reference-thumb></span><div><strong data-edit-reference-label>已选择图片</strong><small data-edit-reference-meta></small></div></article></section><label class="studio-field">人工智能提示<textarea class="textarea hero-textarea" data-edit-prompt rows="5" placeholder="描述您想要创建的内容，例如，换成比基尼并将背景设置为海滩"></textarea></label><small class="field-hint">提示：使用英语提示，效果更佳。</small><div class="credit-summary"><span>所需积分：</span><strong data-credit-cost>10</strong></div><button class="btn primary full-width" data-generate type="button">创建</button></section>
      <section class="studio-panel preview-panel"><div class="preview-head"><h2>生成结果</h2></div><div class="creative-preview empty-preview" data-edit-preview><span class="empty-icon">▧</span><strong>暂无历史记录</strong><small>您生成的图片将显示在这里</small></div><div class="recent-results" data-queue><h2>生成任务</h2></div></section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
