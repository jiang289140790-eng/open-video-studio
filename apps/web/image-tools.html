<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>图像工具 | Open Video Studio</title>
    <meta name="description" content="浏览 Open Video Studio 图像工具：图片编辑器、AI 换脸、造型工作室、姿势生成器、Nano Banana、图像组合器和图片生成器。">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./zh/app/"><span class="brand-mark">OVS</span><span>Open Video Studio</span></a>
      <nav class="topnav" aria-label="Primary navigation"><a href="./zh/image-tools/" aria-current="page">图像工具</a><a href="./zh/video-tools/">视频工具</a><a href="./zh/pricing/">购买积分</a><a href="./zh/free-coins/">免费硬币</a><a href="./zh/my-creations/">我的创作</a></nav>
      <nav class="accountnav" aria-label="Account navigation"><a class="daily-check" href="./zh/free-coins/">每日签到</a><a href="./zh/login/">登录</a></nav>
    </header>
    <main class="app-surface tool-detail-page tool-category-page">
      <section class="page-hero compact center">
        <p class="eyebrow">AI 图像工具</p>
        <h1>选择一个图像工作流</h1>
        <p class="lead">从生成、编辑、换脸、造型、姿势到多图组合，把每次结果保存为可复用资产。</p>
      </section>
      <section class="tool-directory-bar" aria-label="图像工具筛选">
        <div class="tool-filter-tabs">
          <button class="active" type="button" data-tool-home-filter="all">全部</button>
          <button type="button" data-tool-home-filter="hot">热门</button>
          <button type="button" data-tool-home-filter="new">最新</button>
          <button type="button" data-tool-home-filter="edit">编辑</button>
          <button type="button" data-tool-home-filter="character">角色</button>
        </div>
        <label class="tool-search-box"><span>搜索图像工具</span><input type="search" placeholder="搜索编辑、换脸、造型、姿势..." data-tool-home-search></label>
      </section>
      <section class="tool-section" data-tool-home-section="image hot edit">
        <div class="tool-section-head"><h2>热门图像工具</h2><a href="./zh/app/generate/">直接生成图片</a></div>
        <div class="card-carousel">
          <a class="tool-poster art-3" href="./zh/app/image-editor/" data-tool-home-card data-tool-tags="image hot edit 图片 编辑 重绘 修复"><strong>图片编辑器</strong><span>重绘、扩图、局部修复</span></a>
          <a class="tool-poster art-2 locked" href="./zh/app/face-swap/" data-tool-home-card data-tool-tags="image hot face character 换脸 授权 角色"><strong>AI 换脸</strong><span>授权角色替换</span></a>
          <a class="tool-poster art-11" href="./zh/app/outfit-studio/" data-tool-home-card data-tool-tags="image outfit character 造型 服装"><strong>造型工作室</strong><span>服装与品牌风格</span></a>
          <a class="tool-poster art-10 locked" href="./zh/app/pose-generator/" data-tool-home-card data-tool-tags="image pose character 姿势 动作 分镜"><strong>姿势生成器</strong><span>动作和镜头参考</span></a>
          <a class="tool-poster art-8" href="./zh/app/nano-banana/" data-tool-home-card data-tool-tags="image new nano banana 快速 创意"><strong>Nano Banana</strong><span>快速创意实验</span></a>
          <a class="tool-poster art-5" href="./zh/app/image-combiner/" data-tool-home-card data-tool-tags="image combiner edit 多图 参考 合成"><strong>图像组合器</strong><span>多图参考合成</span></a>
          <a class="tool-poster art-13" href="./zh/app/generate/" data-tool-home-card data-tool-tags="image hot generation 图片 生成"><strong>图片生成器</strong><span>提示词到图像</span></a>
        </div>
      </section>
      <section class="tool-conversion-strip">
        <div><p class="eyebrow">下一步</p><h2>先创建角色，再生成图像资产</h2><p class="muted">目标站式工具入口应该能把用户导向完整创作链路，而不是停在单个页面。</p></div>
        <div class="tool-conversion-actions"><a class="btn primary" href="./zh/app/characters/">创建角色</a><a class="btn glass" href="./zh/assets/">打开资产库</a></div>
      </section>
      <p class="empty-tool-state" data-tool-home-empty hidden>没有找到匹配图像工具。</p>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
