<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>图片转视频 | Open Video Studio</title>
    <meta name="description" content="上传参考图片并生成 AI 视频，保存到 Open Video Studio 的资产库和我的创作。">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./index.html"><span class="brand-mark">OVS</span><span>Open Video Studio</span></a>
      <nav class="topnav" aria-label="Primary navigation"><a href="./generate.html">图像工具</a><a href="./image-to-video.html" aria-current="page">视频工具</a><a href="./pricing.html">购买积分</a><a href="./referral.html">免费硬币</a><a href="./my-creations.html">我的创作</a></nav>
      <nav class="accountnav" aria-label="Account navigation"><a class="daily-check" href="./referral.html">Daily Check-in</a><a href="./signin.html">登录</a></nav>
      <a class="btn primary" href="./pricing.html"><span data-credit-balance>40</span> credits</a>
    </header>
    <main class="studio-shell video-tool-page">
      <section class="studio-panel control-panel">
        <p class="eyebrow">AI 视频</p>
        <h1>图片转视频</h1>
        <p class="lead">上传一张产品图、角色图或场景图，生成可保存、可分享、可复用的短视频资产。</p>
        <div class="mode-grid" aria-label="Mode cards">
          <button class="mode-card active" data-mode="video"><span>Video</span><strong>图片转视频</strong><em>24 credits</em></button>
          <button class="mode-card" data-mode="image"><span>Image</span><strong>先生成参考图</strong><em>8 credits</em></button>
        </div>
        <label class="upload-zone">上传参考图片
          <input type="file" aria-label="Upload reference image">
          <span>支持角色、产品、海报、场景参考图</span>
        </label>
        <label class="studio-field">动作描述
          <textarea class="textarea hero-textarea">将这张图转换成 8 秒电影感短视频，镜头缓慢推进，灯光高级，适合社交媒体发布。</textarea>
        </label>
        <button class="btn glass" data-enhance type="button">优化提示词</button>
      </section>
      <section class="studio-panel preview-panel">
        <div class="preview-head"><div><p class="eyebrow">Preview</p><h2>生成预览</h2></div><span class="credit-pill" data-credit-cost>24 credits</span></div>
        <div class="creative-preview art-7"><span class="play-dot"></span><strong data-mode-label>Video generation</strong></div>
        <div class="sticky-generate"><div><strong>准备生成</strong><p>结果会保存到我的创作、资产库和历史记录。</p></div><button class="btn primary" data-generate type="button">生成视频</button></div>
        <div class="recent-results" data-queue><h2>最近结果</h2></div>
      </section>
    </main>
    <section class="app-surface tool-section">
      <div class="tool-section-head"><h2>更多视频工具</h2><a href="./app.html">View More</a></div>
      <div class="card-carousel video-row">
        <a class="tool-poster art-1 locked" href="./image-to-video.html"><strong>Product Teaser</strong><span>产品短片</span></a>
        <a class="tool-poster art-13 locked" href="./image-to-video.html"><strong>Social Reel</strong><span>社媒视频</span></a>
        <a class="tool-poster art-4 locked" href="./history.html"><strong>My Creations</strong><span>生成历史</span></a>
      </div>
    </section>
    <script type="module" src="./app.js"></script>
  </body>
</html>
