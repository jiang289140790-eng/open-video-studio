<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luravyn Brand Preview</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <style>
      :root {
        color-scheme: light;
        --ink: #11172d;
        --muted: #6a7187;
        --line: #e7e9f2;
        --night: #090b16;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f7f8fb;
        color: var(--ink);
        font-family: Inter, "Plus Jakarta Sans", Manrope, Arial, sans-serif;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 48px 24px 72px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .panel {
        min-height: 280px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        display: grid;
        place-items: center;
        padding: 36px;
      }

      .panel.dark {
        background: radial-gradient(circle at 50% 25%, #171b38, var(--night) 58%);
        border-color: #222744;
      }

      .wide {
        grid-column: 1 / -1;
      }

      .logo {
        width: min(760px, 100%);
        height: auto;
      }

      .icon-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 28px;
        flex-wrap: wrap;
      }

      .icon-xl {
        width: 184px;
        height: 184px;
      }

      .icon-md {
        width: 64px;
        height: 64px;
      }

      .icon-sm {
        width: 32px;
        height: 32px;
      }

      .label {
        margin-top: 18px;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }

      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .wide {
          grid-column: auto;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Luravyn Logo System</h1>
      <p>Subtraction-led vector direction: restrained indigo/violet, rounded abstract T, tiny AI core, no video-player language.</p>

      <section class="grid">
        <div class="panel wide">
          <img class="logo" src="./Luravyn-logo.svg" alt="Luravyn logo on light background" />
        </div>

        <div class="panel dark wide">
          <img class="logo" src="./Luravyn-logo-dark.svg" alt="Luravyn logo on dark background" />
        </div>

        <div class="panel">
          <div>
            <div class="icon-row">
              <img class="icon-xl" src="./Luravyn-icon.svg" alt="Luravyn icon large" />
              <img class="icon-md" src="./Luravyn-icon.svg" alt="Luravyn icon medium" />
              <img class="icon-sm" src="./Luravyn-icon.svg" alt="Luravyn icon small" />
            </div>
            <div class="label">App icon / favicon scale check</div>
          </div>
        </div>

        <div class="panel">
          <div>
            <div class="icon-row">
              <img class="icon-xl" src="./Luravyn-icon-mono.svg" alt="Luravyn monochrome icon large" />
              <img class="icon-md" src="./Luravyn-icon-mono.svg" alt="Luravyn monochrome icon medium" />
              <img class="icon-sm" src="./Luravyn-icon-mono.svg" alt="Luravyn monochrome icon small" />
            </div>
            <div class="label">Single-color fallback</div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
