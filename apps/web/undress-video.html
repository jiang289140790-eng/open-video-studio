<!doctype html>
<html lang="zh-CN">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Undress Video | Luravyn</title><link rel="stylesheet" href="./styles.css"></head>
  <body>
    <header class="topbar"><a class="brand" href="./index.html"><img class="brand-wordmark" src="./brand/luravyn-logo.png" alt="Luravyn"></a><nav class="topnav"><a href="./zh/image-tools/">图像工具⌄</a><a href="./zh/video-tools/">视频工具⌄</a><a href="./zh/pricing/">购买积分</a><a href="./zh/free-coins/">免费硬币</a><a href="./zh/my-creations/">我的创作</a></nav><nav class="accountnav"><a class="daily-check" href="./zh/free-coins/">Daily Check-in</a><a href="./zh/login/">登录</a></nav></header>
    <main class="studio-shell hifun-generator" data-video-generator data-workflow-family="adult-4in1"><div class="visually-hidden" aria-hidden="true"><button type="button" data-mode="video" data-video-preset-button="adult-effects" data-video-cost="40" class="active"></button><textarea class="hero-textarea" data-video-prompt></textarea><select data-video-ratio><option value="16:9">16:9</option></select><select data-video-duration><option value="5">5</option></select><select data-video-model><option value="zealman_workflow">Zealman Workflow</option></select></div>
      <section class="studio-panel control-panel"><a class="back-link" href="./zh/app/">← Undress Video</a><section class="upload-zone" data-video-upload-zone><div class="upload-empty"><strong>在此处拖动图片，或</strong><span>支持 JPEG、PNG 和 WebP 格式</span></div><label class="btn glass">从相册选择<input type="file" accept="image/*" data-video-upload hidden></label><label class="btn glass">拍照上传<input type="file" accept="image/*" capture="environment" data-video-camera-upload hidden></label><article class="reference-card" data-video-reference-card hidden><span class="thumb art-3" data-video-reference-thumb></span><div><strong data-video-reference-label>已选择图片</strong><small data-video-reference-meta></small></div></article></section><p class="field-hint">Make the people in the picture undressed. Please upload a full-body portrait photo.</p><section class="video-effect-selector"><div class="video-effect-selector-head"><strong>选择辣味效果</strong><button class="btn glass" type="button" data-open-video-effect-picker>选择</button></div><button class="selected-effect-card" type="button" data-open-video-effect-picker><span class="effect-thumb art-13"></span><strong data-video-effect-label>Undress Video</strong><span>›</span></button></section><div class="credit-summary"><span>所需积分：</span><strong data-video-cost-note>40</strong></div><button class="btn primary full-width" data-generate type="button">创建</button></section>
      <section class="studio-panel preview-panel"><div class="preview-head"><h2>生成结果</h2></div><div class="creative-preview empty-preview" data-video-preview><span class="empty-icon">▧</span><strong>暂无历史记录</strong><small>您生成的视频将显示在这里</small></div><div class="recent-results" data-queue><h2>生成任务</h2></div></section>
    </main>
    <div class="asset-picker-overlay video-effect-picker" data-video-effect-picker hidden><div class="asset-picker-modal video-effect-modal"><button class="modal-close" type="button" data-close-video-effect-picker aria-label="关闭">×</button><p class="eyebrow">18+ 合规效果库</p><h2>选择辣味效果</h2><p class="muted">选择一个已登记的工作流预设，所有内容必须符合平台规则。</p><div class="chip-row compact video-effect-tabs"><button class="chip active" type="button" data-video-effect-filter="all">全部</button><button class="chip" type="button" data-video-effect-filter="motion">动作</button><button class="chip" type="button" data-video-effect-filter="cinematic">电影感</button><button class="chip" type="button" data-video-effect-filter="social">竖屏</button></div><div class="video-effect-picker-grid"><button class="video-effect-choice art-13 active" type="button" data-video-effect-choice="adult-effects" data-video-effect-tags="motion cinematic"><strong>Undress Video</strong><small>成人、虚构、已授权素材</small></button><button class="video-effect-choice art-1" type="button" data-video-effect-choice="movie-closeup" data-video-effect-tags="cinematic"><strong>电影近景</strong><small>镜头推进与表情动作</small></button><button class="video-effect-choice art-4" type="button" data-video-effect-choice="social-reel" data-video-effect-tags="motion social"><strong>社媒竖屏动作</strong><small>9:16 短视频节奏</small></button><button class="video-effect-choice art-7" type="button" data-video-effect-choice="image-video" data-video-effect-tags="motion cinematic"><strong>通用图片转视频</strong><small>轻微运镜与动作</small></button></div></div></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
