<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Social Accounts | Luravyn</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <meta name="description" content="Luravyn 登录后产品页面。">
    <link rel="canonical" href="https://luravyn.com/zh/accounts/">
    <link rel="alternate" hreflang="zh-CN" href="https://luravyn.com/zh/accounts/">
    <link rel="alternate" hreflang="en" href="https://luravyn.com/en/accounts/">
    <link rel="alternate" hreflang="ja" href="https://luravyn.com/ja/accounts/">
    <link rel="alternate" hreflang="ko" href="https://luravyn.com/ko/accounts/">
    <link rel="alternate" hreflang="x-default" href="https://luravyn.com/en/accounts/">
    <meta name="robots" content="noindex,follow">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Luravyn">
    <meta property="og:title" content="Social Accounts | Luravyn">
    <meta property="og:description" content="Luravyn 登录后产品页面。">
    <meta property="og:url" content="https://luravyn.com/zh/accounts/">
    <meta property="og:image" content="https://luravyn.com/brand/luravyn-logo-hero.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Social Accounts | Luravyn">
    <meta name="twitter:description" content="Luravyn 登录后产品页面。">
    <meta name="theme-color" content="#111111">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./index.html"><img class="brand-wordmark" src="./brand/luravyn-logo.png" alt="Luravyn"></a>
      <nav class="topnav" aria-label="Primary navigation"></nav>
      <nav class="accountnav" aria-label="Account navigation"></nav>
    </header>
    <main class="app-surface content-os-page">
      <section class="page-hero compact">
        <p class="eyebrow">Publishing Accounts</p>
        <h1>连接内容发布账号</h1>
        <p class="lead">第一版先保存发布账号占位状态，让 Campaign、Queue 和 Calendar 能关联平台。真实 OAuth 发布适配器后续再接入。</p>
      </section>
      <section class="content-os-grid">
        <article class="panel">
          <div class="tool-section-head">
            <div>
              <p class="eyebrow">新增连接</p>
              <h2>连接演示账号</h2>
            </div>
            <span class="credit-pill">Mock OAuth</span>
          </div>
          <form class="content-os-form" data-social-account-form>
            <label><span>平台</span><select name="platform"><option>X</option><option>TikTok</option><option>YouTube Shorts</option><option>Instagram</option><option>Pinterest</option><option>Reddit</option><option>Telegram</option><option>Facebook</option></select></label>
            <label><span>账号名称</span><input name="handle" value="@openvideostudio"></label>
            <label><span>用途</span><input name="purpose" value="Campaign 发布账号"></label>
            <button class="btn primary full" type="submit">连接账号</button>
          </form>
        </article>
        <section class="panel">
          <div class="tool-section-head">
            <div>
              <p class="eyebrow">账号列表</p>
              <h2>可用发布账号</h2>
            </div>
            <a href="./zh/calendar/">查看日历</a>
          </div>
          <div class="content-card-list" data-social-account-list></div>
        </section>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
