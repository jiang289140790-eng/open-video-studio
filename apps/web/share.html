<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>公开分享 | Open Video Studio</title>
    <meta name="description" content="查看 Open Video Studio 公开分享的 AI 生成资产、提示词、角色和生成信息。">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="share-body">
    <main class="share-page">
      <a class="brand" href="./index.html"><span class="brand-mark">OVS</span><span>Open Video Studio</span></a>
      <section class="share-frame art-1">
        <span class="play-dot"></span>
        <h1 data-share-title>霓虹发布短片</h1>
      </section>
      <aside class="share-meta">
        <p class="eyebrow">公开分享页</p>
        <h2>由 Open Video Studio 生成</h2>
        <p class="muted" data-share-prompt>提示词：电影感产品发布，固定主持人，紫色工作室灯光，平滑镜头运动。</p>
        <dl>
          <div><dt>角色</dt><dd data-share-character>Mira</dd></div>
          <div><dt>模型</dt><dd>local-video-v0</dd></div>
          <div><dt>积分</dt><dd data-share-credits>24</dd></div>
          <div><dt>状态</dt><dd>公开</dd></div>
        </dl>
        <div class="share-actions">
          <button class="btn primary full" type="button" data-share-generate>生成相似作品</button>
          <button class="btn glass full" type="button" data-share-copy-prompt>复制提示词</button>
          <button class="btn glass full" type="button" data-share-save>保存到我的资产</button>
        </div>
        <div class="share-conversion">
          <span>想创建自己的作品？</span>
          <a href="./zh/app/">浏览工具</a>
          <a href="./zh/pricing/">购买积分</a>
          <a href="./zh/login/" data-auth-modal>登录</a>
        </div>
      </aside>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
