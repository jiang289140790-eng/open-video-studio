<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>视频工具 | Luravyn</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <meta name="description" content="浏览 Luravyn 视频工具：图片转视频、产品短片、社媒短片、生成历史和我的创作。">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./zh/app/"><img class="brand-wordmark" src="./brand/luravyn-logo.png" alt="Luravyn"></a>
      <nav class="topnav" aria-label="Primary navigation"><a href="./zh/image-tools/">图像工具</a><a href="./zh/video-tools/" aria-current="page">视频工具</a><a href="./zh/pricing/">购买积分</a><a href="./zh/free-coins/">免费硬币</a><a href="./zh/my-creations/">我的创作</a></nav>
      <nav class="accountnav" aria-label="Account navigation"><a class="daily-check" href="./zh/free-coins/">每日签到</a><a href="./zh/login/">登录</a></nav>
    </header>
    <main class="app-surface tool-detail-page tool-category-page">
      <section class="page-hero compact center">
        <p class="eyebrow">AI 视频工具</p>
        <h1>把图像资产变成视频</h1>
        <p class="lead">从图片转视频、产品短片到社媒竖屏视频，所有结果进入我的创作、生成历史和分享链路。</p>
      </section>
      <section class="tool-directory-bar" aria-label="视频工具筛选">
        <div class="tool-filter-tabs">
          <button class="active" type="button" data-tool-home-filter="all">全部</button>
          <button type="button" data-tool-home-filter="hot">热门</button>
          <button type="button" data-tool-home-filter="new">最新</button>
          <button type="button" data-tool-home-filter="video">视频</button>
          <button type="button" data-tool-home-filter="history">历史</button>
        </div>
        <label class="tool-search-box"><span>搜索视频工具</span><input type="search" placeholder="搜索图片转视频、短片、历史..." data-tool-home-search></label>
      </section>
      <section class="tool-section" data-tool-home-section="video hot">
        <div class="tool-section-head"><h2>视频工具</h2><a href="./zh/app/image-to-video/">立即转视频</a></div>
        <div class="card-carousel video-row">
          <a class="tool-poster art-7 locked" href="./zh/app/image-to-video/" data-tool-home-card data-tool-tags="video hot image to video 图片转视频"><strong>图片转视频</strong><span>静态资产转短视频</span></a>
          <a class="tool-poster art-1 locked" href="./zh/app/image-to-video/" data-tool-home-card data-tool-tags="video product teaser 产品短片"><strong>产品短片</strong><span>主视觉生成发布片</span></a>
          <a class="tool-poster art-13 locked" href="./zh/app/image-to-video/" data-tool-home-card data-tool-tags="video new social reel 社媒视频"><strong>社媒竖屏视频</strong><span>适合广告和短内容</span></a>
          <a class="tool-poster art-4" href="./zh/history/" data-tool-home-card data-tool-tags="video history 生成历史 任务"><strong>生成历史</strong><span>查看任务和成本</span></a>
          <a class="tool-poster art-9" href="./zh/my-creations/" data-tool-home-card data-tool-tags="video history creations 我的创作 资产"><strong>我的创作</strong><span>管理生成作品</span></a>
        </div>
      </section>
      <section class="tool-conversion-strip">
        <div><p class="eyebrow">推荐流程</p><h2>先选图像资产，再转成视频</h2><p class="muted">视频工具页直接连接资产库、生成历史和分享页，让用户能完成可复用内容闭环。</p></div>
        <div class="tool-conversion-actions"><a class="btn primary" href="./zh/assets/">选择资产</a><a class="btn glass" href="./zh/history/">查看历史</a></div>
      </section>
      <p class="empty-tool-state" data-tool-home-empty hidden>没有找到匹配视频工具。</p>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
