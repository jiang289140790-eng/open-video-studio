<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Studio | Luravyn</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <meta name="description" content="Luravyn 登录后产品页面。">
    <link rel="canonical" href="https://luravyn.com/zh/ai-studio/">
    <link rel="alternate" hreflang="zh-CN" href="https://luravyn.com/zh/ai-studio/">
    <link rel="alternate" hreflang="en" href="https://luravyn.com/en/ai-studio/">
    <link rel="alternate" hreflang="ja" href="https://luravyn.com/ja/ai-studio/">
    <link rel="alternate" hreflang="ko" href="https://luravyn.com/ko/ai-studio/">
    <link rel="alternate" hreflang="x-default" href="https://luravyn.com/en/ai-studio/">
    <meta name="robots" content="noindex,follow">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Luravyn">
    <meta property="og:title" content="AI Studio | Luravyn">
    <meta property="og:description" content="Luravyn 登录后产品页面。">
    <meta property="og:url" content="https://luravyn.com/zh/ai-studio/">
    <meta property="og:image" content="https://luravyn.com/brand/luravyn-logo-hero.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AI Studio | Luravyn">
    <meta name="twitter:description" content="Luravyn 登录后产品页面。">
    <meta name="theme-color" content="#111111">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./index.html"><img class="brand-wordmark" src="./brand/luravyn-logo.png" alt="Luravyn"></a>
      <nav class="topnav" aria-label="Primary navigation"></nav>
      <nav class="accountnav" aria-label="Account navigation"></nav>
    </header>
    <main class="app-surface content-os-page">
      <section class="page-hero compact">
        <p class="eyebrow">AI Studio</p>
        <h1>从 Topic 到 Prompt 的内容生产台</h1>
        <p class="lead">先用 mock AI 跑通产品链路：选题研究、脚本、提示词、图片/视频占位、Caption、Hashtags、Translation、CTA 和质量检查。</p>
      </section>

      <section class="ai-studio-layout">
        <article class="panel">
          <div class="tool-section-head">
            <div>
              <p class="eyebrow">输入</p>
              <h2>生成内容包</h2>
            </div>
            <span class="credit-pill">0 积分演示</span>
          </div>
          <form class="content-os-form" data-ai-studio-form>
            <label><span>选择 Campaign</span><select name="campaignId" data-campaign-select></select></label>
            <label><span>Topic</span><textarea name="topic" rows="4">把一个提示词变成完整社媒内容包</textarea></label>
            <label><span>使用角色</span><select name="character"><option>Mira - 工作室主持人</option><option>Atlas - 产品讲解员</option><option>Nova - 创作者形象</option></select></label>
            <button class="btn primary full" type="submit">生成 AI Studio 草稿</button>
          </form>
        </article>

        <section class="panel ai-studio-output">
          <div class="tool-section-head">
            <div>
              <p class="eyebrow">输出</p>
              <h2>内容生产结果</h2>
            </div>
            <a href="./zh/pipeline/">进入 Pipeline</a>
          </div>
          <div class="studio-output-grid" data-ai-studio-output></div>
        </section>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
