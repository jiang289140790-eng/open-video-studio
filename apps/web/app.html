<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 工具 | Luravyn</title>
    <meta name="description" content="AI 图像与视频工具">
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./index.html"><img class="brand-wordmark" src="./brand/luravyn-logo.png" alt="Luravyn"></a>
      <nav class="topnav" aria-label="主导航">
        <a href="./zh/image-tools/">图像工具</a>
        <a href="./zh/video-tools/">视频工具</a>
        <a href="./zh/pricing/">购买积分</a>
        <a href="./zh/free-coins/">免费硬币</a>
        <a href="./zh/my-creations/">我的创作</a>
      </nav>
      <nav class="accountnav" aria-label="账户导航"><a class="daily-check" href="./zh/free-coins/">Daily Check-in</a><a href="./zh/login/">登录</a></nav>
    </header>
    <div class="app-layout">
      <aside class="side-rail" aria-label="工具导航">
        <nav class="rail-menu" aria-label="工具菜单">
          <a class="side-link active" href="./zh/app/">首页</a>
          <a class="side-link" href="./zh/app/spicy-effects/">辛辣效果 <span class="badge-hot">HOT</span></a>
          <p class="side-label">AI 图像</p>
          <a class="side-link" href="./zh/app/image-editor/">图片编辑器</a>
          <a class="side-link" href="./zh/app/face-swap/">AI 换脸</a>
          <a class="side-link" href="./zh/app/outfit-studio/">性感礼服</a>
          <a class="side-link" href="./zh/app/pose-generator/">性爱姿势</a>
          <p class="side-label">AI 视频</p>
          <a class="side-link" href="./zh/app/image-to-video/">图片转视频</a>
          <a class="side-link" href="./zh/my-creations/">我的创作</a>
        </nav>
        <div class="rail-actions" aria-label="账户快捷入口">
          <a href="./zh/referral/">推荐好友</a>
          <a class="rail-upgrade" href="./zh/pricing/?from=sidebar">立即升级</a>
        </div>
      </aside>
      <main class="app-surface home-v2" id="homeRoot"></main>
    </div>
    <script src="./tools-data.js"></script>
    <script>
      (function render() {
        var d = window.__TOOLS_DATA__;
        if (!d) return setTimeout(render, 50);
        var root = document.getElementById('homeRoot');
        if (!root) return;

        function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function h(tag, attrs, children) {
          var el = document.createElement(tag);
          if (attrs) for (var k in attrs) { if (k==='className') el.className=attrs[k]; else el.setAttribute(k,attrs[k]); }
          if (typeof children==='string') el.innerHTML=children;
          else if (children) for (var i=0;i<children.length;i++) { if (typeof children[i]==='string') el.appendChild(document.createTextNode(children[i])); else el.appendChild(children[i]); }
          return el;
        }

        var frag = document.createDocumentFragment();

        // ── Hero ──
        var hero = d.hero;
        frag.appendChild(
          h('section', {className:'home-hero', 'data-home-section-type':'hero'}, [
            h('div', {className:'hero-main'}, [
              h('span', {className:'hero-eyebrow'}, 'NEW'),
              h('h1', {}, esc(hero.title)),
              h('p', {}, esc(hero.desc)),
              h('a', {className:'hero-cta', href:hero.link}, esc(hero.cta) + ' →')
            ]),
            h('div', {className:'hero-visual'}, [
              h('img', {src:hero.image, alt:hero.title, loading:'eager'})
            ])
          ])
        );

        // ── Quick Tools Row ──
        var qtSection = h('section', {className:'home-section', 'data-home-section-type':'quick_tools'}, [
          h('div', {className:'section-head'}, [h('h2', {}, '快捷工具')])
        ]);
        var qtRow = h('div', {className:'quick-row'});
        d.quickTools.forEach(function(t) {
          qtRow.appendChild(
            h('a', {className:'qc-card', href:t.link}, [
              h('img', {src:t.image, alt:t.name, loading:'lazy'}),
              h('span', {className:'qc-label'}, esc(t.name)),
              t.tag ? h('span', {className:'qc-hot'}, esc(t.tag)) : '',
              h('i', {className:'qc-arrow'}, '↗')
            ])
          );
        });
        qtSection.appendChild(qtRow);
        frag.appendChild(qtSection);

        // Target-site style directory filters and search.
        // Contract: data-tool-home-filter="hot", data-tool-home-filter="new",
        // data-tool-home-filter="image", data-tool-home-filter="video",
        // data-tool-home-filter="character", data-tool-home-search,
        // data-tool-home-card, data-tool-home-empty.
        frag.appendChild(h('section', {className:'tool-directory-bar'}, [
          h('div', {className:'tool-filter-tabs'}, [
            h('button', {type:'button', 'data-tool-home-filter':'all', className:'active'}, '全部'),
            h('button', {type:'button', 'data-tool-home-filter':'hot'}, '热门'),
            h('button', {type:'button', 'data-tool-home-filter':'new'}, '最新'),
            h('button', {type:'button', 'data-tool-home-filter':'image'}, '图像'),
            h('button', {type:'button', 'data-tool-home-filter':'video'}, '视频'),
            h('button', {type:'button', 'data-tool-home-filter':'character'}, '角色')
          ]),
          h('input', {type:'search', 'data-tool-home-search':'', placeholder:'搜索图像或视频工具', 'aria-label':'搜索图像或视频工具'})
        ]));

        // ── Content Sections ──
        d.sections.forEach(function(sec) {
          var category = sec.id === 'spicy-effects' ? 'video' : 'image';
          var sectionType = /popular|hot/i.test(sec.id + ' ' + (sec.title || '')) ? 'popular_tools' : 'showcase';
          var section = h('section', {className:'home-section', 'data-home-section-type':sectionType, 'data-tool-home-section':'', 'data-tool-tags':category + ' ' + sec.id + ' ' + (sec.title || '')});

          // Section head with title + count + link
          var countHtml = sec.count ? ' <small>(' + esc(sec.count) + ')</small>' : '';
          section.appendChild(
            h('div', {className:'section-head'}, [
              h('h2', {}, esc(sec.title) + countHtml),
              h('a', {href:sec.link}, 'View More →')
            ])
          );

          // Filter tabs for spicy effects
          if (sec.filterTags) {
            var filterRow = h('div', {className:'section-filter-row'});
            sec.filterTags.forEach(function(tag, i) {
              filterRow.appendChild(
                h('button', {className:'section-chip' + (i===0?' active':''), type:'button'}, esc(tag))
              );
            });
            section.appendChild(filterRow);
          }

          // Card row
          var row = h('div', {className:'card-row'});
          sec.items.forEach(function(item) {
            row.appendChild(
              h('a', {className:'hc-card', href:item.link, 'data-tool-home-card':'', 'data-tool-tags':category + ' ' + sec.id + ' ' + (item.tag || '') + ' ' + item.name}, [
                h('div', {className:'hc-img'}, [
                  h('img', {src:item.image, alt:item.name, loading:'lazy'})
                ]),
                h('div', {className:'hc-body'}, [
                  h('strong', {}, esc(item.name)),
                  h('small', {}, esc(item.desc)),
                  item.tag ? h('span', {className:'hc-tag'}, esc(item.tag)) : ''
                ])
              ])
            );
          });
          section.appendChild(row);
          frag.appendChild(section);
        });
        frag.appendChild(h('p', {className:'tool-directory-empty', 'data-tool-home-empty':'', hidden:'true'}, '没有匹配的工具'));

        // ── Spicy Chat Banner ──
        if (d.chatBanner) {
          var cb = d.chatBanner;
          frag.appendChild(
            h('section', {className:'home-section'}, [
              h('div', {className:'chat-banner'}, [
                h('div', {className:'chat-banner-text'}, [
                  h('h2', {}, esc(cb.title)),
                  h('p', {}, esc(cb.desc)),
                  h('a', {className:'hero-cta', href:'./zh/app/spicy-effects/'}, esc(cb.cta))
                ]),
                h('img', {src:cb.image, alt:cb.title, loading:'lazy'})
              ])
            ])
          );
        }

        root.appendChild(frag);
      })();
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
