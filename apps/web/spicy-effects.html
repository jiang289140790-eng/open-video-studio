        </div>
      </aside>
      <main class="app-surface spicy-page" id="spicyRoot"></main>
    </div>
    <script src="./spicy-effects-data.js"></script>
    <script>
      (function render() {
        var d = window.__SPICY_DATA__;
        if (!d) return setTimeout(render, 50);
        var root = document.getElementById('spicyRoot');
        if (!root) return;

        function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function h(tag, attrs, children) {
          var el = document.createElement(tag);
          if (attrs) for (var k in attrs) { if (k==='className') el.className=attrs[k]; else el.setAttribute(k,attrs[k]); }
          if (typeof children==='string') el.innerHTML=children;
          else if (children) for (var i=0;i<children.length;i++) { if (typeof children[i]==='string') el.appendChild(document.createTextNode(children[i])); else el.appendChild(children[i]); }
          return el;
        }

        var frag = document.createDocumentFragment();

        // ── Page Hero ──
        frag.appendChild(
          h('section', {className:'spicy-hero'}, [
            h('p', {className:'spicy-eyebrow'}, 'HOT · 18+'),
            h('h1', {}, esc(d.header.title) + ' <small>(' + esc(d.header.count) + ')</small>'),
            h('p', {className:'spicy-lead'}, esc(d.header.desc))
          ])
        );

        // ── Age Notice ──
        frag.appendChild(
          h('div', {className:'spicy-age-notice'}, esc(d.header.ageNotice))
        );

        // ── Filter Tags ──
        var filterRow = h('div', {className:'spicy-filter-bar', role:'tablist', 'aria-label':'特效分类'});
        d.filterTags.forEach(function(tag, i) {
          filterRow.appendChild(
            h('button', {className:'spicy-chip' + (i===0?' active':''), type:'button', 'data-spicy-filter':tag}, esc(tag))
          );
        });
        frag.appendChild(filterRow);

        // ── Card Grid ──
        var grid = h('section', {className:'spicy-card-grid', 'aria-label':'辣味特效卡片'});
        d.cards.forEach(function(card, i) {
          var lockBadge = card.locked ? h('span', {className:'spicy-card-lock'}, '解锁') : '';
          grid.appendChild(
            h('a', {className:'spicy-card art-' + ((i%10)+1), href:card.link, 'data-spicy-card':'', 'data-spicy-tags':card.tags.join(' ')}, [
              lockBadge,
              h('strong', {}, esc(card.name)),
              h('small', {}, esc(card.desc))
            ])
          );
        });
        frag.appendChild(grid);

        // ── Chat Banner ──
        if (d.chatBanner) {
          var cb = d.chatBanner;
          frag.appendChild(
            h('section', {className:'spicy-chat-banner'}, [
              h('div', {className:'spicy-chat-text'}, [
                h('h2', {}, esc(cb.title)),
                h('p', {}, esc(cb.desc)),
                h('a', {className:'hero-cta', href:'./zh/app/spicy-effects/'}, esc(cb.cta))
              ]),
              h('img', {src:cb.image, alt:cb.title, loading:'lazy'})
            ])
          );
        }

        root.appendChild(frag);
      })();
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
